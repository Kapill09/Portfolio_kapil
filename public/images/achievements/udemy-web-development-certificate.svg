<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Udemy Web Development Certificate</title>
  <desc id="desc">A clean purple and green certificate illustration for a Udemy web development certificate.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffef9"/>
      <stop offset=".6" stop-color="#f8fff9"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#a435f0"/>
      <stop offset="1" stop-color="#19a974"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#203b32" flood-opacity=".16"/>
    </filter>
    <pattern id="grain" width="9" height="9" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="3" r=".55" fill="#3b4f55" opacity=".07"/>
      <circle cx="7" cy="6" r=".5" fill="#a435f0" opacity=".045"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="#d7f4ec"/>
  <rect x="86" y="74" width="1028" height="752" rx="18" fill="url(#paper)" filter="url(#shadow)"/>
  <rect x="132" y="120" width="936" height="660" rx="12" fill="none" stroke="#c6b1ff" stroke-width="4"/>
  <rect x="158" y="146" width="884" height="608" rx="8" fill="none" stroke="#9be3c7" stroke-width="2"/>
  <rect x="86" y="74" width="1028" height="752" rx="18" fill="url(#grain)" opacity=".34"/>
  <path d="M210 74h780v92H210z" fill="url(#accent)" opacity=".94"/>
  <path d="M210 166l64 50 64-50M862 166l64 50 64-50" fill="url(#accent)" opacity=".94"/>
  <text x="600" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="5" fill="#fff">UDEMY</text>
  <text x="600" y="252" text-anchor="middle" font-family="Georgia, serif" font-size="54" font-weight="700" fill="#223044">Certificate of Completion</text>
  <text x="600" y="368" text-anchor="middle" font-family="Georgia, serif" font-size="76" font-weight="700" fill="#242033">Web Development</text>
  <text x="600" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#596878">Completed coursework in modern frontend and backend fundamentals</text>
  <g transform="translate(470 510)">
    <rect x="0" y="0" width="260" height="150" rx="24" fill="#ffffff" stroke="#19a974" stroke-width="6"/>
    <path d="M50 104l38-42 34 28 52-62 38 76" fill="none" stroke="#a435f0" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="46" y="34" width="168" height="12" rx="6" fill="#19a974" opacity=".45"/>
    <rect x="46" y="122" width="168" height="10" rx="5" fill="#19a974" opacity=".26"/>
  </g>
  <path d="M190 694h260" stroke="#97a39f" stroke-width="4"/>
  <path d="M750 694h260" stroke="#97a39f" stroke-width="4"/>
  <text x="320" y="738" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#62716d">Instructor</text>
  <text x="880" y="738" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#62716d">Course Platform</text>
</svg>
