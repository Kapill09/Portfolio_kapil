<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Robo Race Runner-Up Certificate</title>
  <desc id="desc">A premium blue and gold certificate illustration for Robo Race Runner-Up.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffef9"/>
      <stop offset="0.58" stop-color="#f5fbff"/>
      <stop offset="1" stop-color="#eaf4fb"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" x2="1">
      <stop offset="0" stop-color="#2d8cf0"/>
      <stop offset="1" stop-color="#6dc8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#1d3557" flood-opacity=".18"/>
    </filter>
    <pattern id="grain" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r=".75" fill="#455a64" opacity=".08"/>
      <circle cx="8" cy="5" r=".55" fill="#8d6e63" opacity=".06"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="#bfeaff"/>
  <rect x="84" y="74" width="1032" height="752" rx="18" fill="url(#paper)" filter="url(#shadow)"/>
  <rect x="126" y="116" width="948" height="668" rx="10" fill="none" stroke="#90caf9" stroke-width="5"/>
  <rect x="154" y="144" width="892" height="612" rx="6" fill="none" stroke="#ffd166" stroke-width="2"/>
  <rect x="84" y="74" width="1032" height="752" rx="18" fill="url(#grain)" opacity=".35"/>
  <path d="M84 188h1032v86H84z" fill="url(#ribbon)" opacity=".92"/>
  <text x="600" y="178" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#1f3650">Certificate of Achievement</text>
  <text x="600" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="6" fill="#ffffff">ROBO RACE</text>
  <text x="600" y="356" text-anchor="middle" font-family="Georgia, serif" font-size="88" font-weight="700" fill="#203044">Runner-Up</text>
  <text x="600" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#516174">Awarded for speed, control, and problem solving</text>
  <g transform="translate(478 486)">
    <circle cx="122" cy="92" r="82" fill="#e8f5ff" stroke="#2d8cf0" stroke-width="8"/>
    <path d="M75 112h94l-14 40H89z" fill="#203044"/>
    <rect x="84" y="52" width="76" height="58" rx="16" fill="#2d8cf0"/>
    <circle cx="106" cy="82" r="8" fill="#fff"/>
    <circle cx="138" cy="82" r="8" fill="#fff"/>
    <path d="M122 52V28M96 28h52" stroke="#203044" stroke-width="8" stroke-linecap="round"/>
    <path d="M54 148c44 34 92 34 136 0" fill="none" stroke="#ffd166" stroke-width="10" stroke-linecap="round"/>
  </g>
  <path d="M185 685h260" stroke="#90a4ae" stroke-width="4"/>
  <path d="M755 685h260" stroke="#90a4ae" stroke-width="4"/>
  <text x="315" y="730" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#607080">Event Jury</text>
  <text x="885" y="730" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#607080">Organizer</text>
