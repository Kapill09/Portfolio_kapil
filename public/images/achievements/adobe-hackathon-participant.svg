<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Adobe Hackathon Participant Certificate</title>
  <desc id="desc">A modern red and ivory certificate illustration for Adobe Hackathon participation.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset=".65" stop-color="#fff8f5"/>
      <stop offset="1" stop-color="#f3edf8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#ff4d5f"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#3d1f2d" flood-opacity=".16"/>
    </filter>
    <pattern id="grain" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r=".8" fill="#6b4e4e" opacity=".07"/>
      <circle cx="9" cy="7" r=".55" fill="#7c3aed" opacity=".05"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="#ffd9df"/>
  <rect x="86" y="74" width="1028" height="752" rx="18" fill="url(#paper)" filter="url(#shadow)"/>
  <rect x="126" y="114" width="948" height="672" rx="10" fill="none" stroke="#ff9aa7" stroke-width="4"/>
  <path d="M86 74h310L246 826H86z" fill="url(#accent)" opacity=".12"/>
  <path d="M954 74h160v752H818z" fill="url(#accent)" opacity=".1"/>
  <rect x="86" y="74" width="1028" height="752" rx="18" fill="url(#grain)" opacity=".32"/>
  <g transform="translate(150 138)">
    <rect width="92" height="92" rx="16" fill="#ed2224"/>
    <path d="M46 21l30 50H60L47 48 34 71H18z" fill="#fff"/>
  </g>
  <text x="600" y="186" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#2a2530">Certificate of Participation</text>
  <text x="600" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="5" fill="#ed2224">ADOBE HACKATHON</text>
  <text x="600" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="78" font-weight="700" fill="#262334">Participant</text>
  <text x="600" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#64586c">Recognized for building, collaborating, and shipping ideas</text>
  <g transform="translate(456 512)">
    <rect x="0" y="0" width="288" height="126" rx="28" fill="#fff" stroke="#ff9aa7" stroke-width="5"/>
    <path d="M48 82l48-50 48 50 48-50 48 50" fill="none" stroke="#ed2224" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="242" cy="33" r="13" fill="#7c3aed"/>
  </g>
  <path d="M192 690h260" stroke="#a396a8" stroke-width="4"/>
  <path d="M748 690h260" stroke="#a396a8" stroke-width="4"/>
  <text x="322" y="735" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#73677a">Mentor</text>
  <text x="878" y="735" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#73677a">Hackathon Team</text>
</svg>
